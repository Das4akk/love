<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love you, Heart</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>

<!-- 🎵 МУЗЫКА -->
<audio id="music" autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a7c7b2.mp3?filename=romantic-11618.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let W, H

function resize() {
  W = canvas.width = window.innerWidth
  H = canvas.height = window.innerHeight
}
resize()

const density = 140

const points = []
for (let i = 0; i < density; i++) {
  points.push(i * (Math.PI * 2 / density))
}

function heart(t) {
  const x = 16 * Math.pow(Math.sin(t), 3)
  const y =
    13 * Math.cos(t) -
    5 * Math.cos(2 * t) -
    2 * Math.cos(3 * t) -
    Math.cos(4 * t)

  return { x, y }
}

const c1 = [59, 0, 18]
const c2 = [42, 0, 13]

let time = 0

function lerp(a, b, t) {
  return a + (b - a) * t
}

function animate() {
  time += 0.005

  ctx.fillStyle = "#000"
  ctx.fillRect(0, 0, W, H)

  const min = Math.min(W, H)
  const base = min * 0.04

  const pulse = 1 + Math.sin(time * 1.2) * 0.05
  const rot = time * 0.22
  const fontSize = min * 0.02

  const blend = (Math.sin(time * 0.4) + 1) / 2

  const r = lerp(c1[0], c2[0], blend)
  const g = lerp(c1[1], c2[1], blend)
  const b = lerp(c1[2], c2[2], blend)

  const color = `rgb(${r|0},${g|0},${b|0})`

  for (let i = 0; i < density; i++) {

    let t = points[i] + time * 0.225

    let { x, y } = heart(t)

    let rx = x * Math.cos(rot)
    let z = x * Math.sin(rot)

    const persp = 1 / (1 + z * 0.03)

    const px = W / 2 + rx * base * persp * pulse
    const py = H / 2 - y * base * persp * pulse

    ctx.fillStyle = color
    ctx.font = `bold ${fontSize * persp}px Georgia`
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    ctx.fillText("I love you", px, py)
  }

  requestAnimationFrame(animate)
}

window.addEventListener("resize", resize)
animate()

// 🎵 если autoplay заблокирован — старт по клику
window.addEventListener("click", () => {
  document.getElementById("music").play()
})
</script>

</body>
</html>
