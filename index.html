<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love you, Heart</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: #000000;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const text = "I love you"
let objects = []

function resize() {
  canvas.width = window.innerWidth
  canvas.height = window.innerHeight
}

resize()

// УВЕЛИЧЕННАЯ ПЛОТНОСТЬ
const density = 300

for (let i = 0; i < density; i++) {
  objects.push({ 
    t: i * (Math.PI * 2 / density),
    offset: Math.random() * 1000 // для разного градиента
  })
}

function heart(t) {
  const minDim = Math.min(canvas.width, canvas.height)
  const scale = minDim * 0.04

  const x = 16 * Math.pow(Math.sin(t), 3)
  const y = (13 * Math.cos(t))
           - (5 * Math.cos(2 * t))
           - (2 * Math.cos(3 * t))
           - (Math.cos(4 * t))

  return {
    x: canvas.width / 2 + x * scale,
    y: canvas.height / 2 - y * scale
  }
}

let time = 0

function animate() {
  time += 0.02

  // ЧЁРНЫЙ ФОН
  ctx.fillStyle = "#000000"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  const fontSize = Math.max(10, Math.min(canvas.width, canvas.height) * 0.025)

  for (let obj of objects) {
    obj.t += 0.0035
    const pos = heart(obj.t)

    // АНИМИРОВАННЫЙ БОРДОВЫЙ ГРАДИЕНТ
    const gradient = ctx.createLinearGradient(
      pos.x - 40, pos.y - 40,
      pos.x + 40, pos.y + 40
    )

    const shift = (Math.sin(time + obj.offset) + 1) / 2

    gradient.addColorStop(0, `rgb(${120 + 80*shift}, 0, ${40 + 40*shift})`)
    gradient.addColorStop(0.5, `rgb(${180 + 50*shift}, 0, ${60 + 60*shift})`)
    gradient.addColorStop(1, `rgb(${90 + 60*shift}, 0, ${30 + 30*shift})`)

    ctx.fillStyle = gradient
    ctx.font = `bold ${fontSize}px Georgia`
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    ctx.fillText(text, pos.x, pos.y)
  }

  requestAnimationFrame(animate)
}

window.addEventListener("resize", resize)

animate()
</script>
</body>
</html>
