<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love you, Heart</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: #000000;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
.hint {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #666;
  font-family: Arial;
  font-size: 12px;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="hint">1 — винный | 2 — почти чёрный | 3 — со свечением</div>

<script>
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const text = "I love you"
let objects = []

function resize() {
  canvas.width = window.innerWidth
  canvas.height = window.innerHeight
}

resize()

const density = 180

for (let i = 0; i < density; i++) {
  objects.push({ 
    t: i * (Math.PI * 2 / density)
  })
}

function heart(t) {
  const x = 16 * Math.pow(Math.sin(t), 3)
  const y = (13 * Math.cos(t))
           - (5 * Math.cos(2 * t))
           - (2 * Math.cos(3 * t))
           - (Math.cos(4 * t))
  return { x, y }
}

let time = 0
let mode = 1 // текущий стиль

// переключение режимов
window.addEventListener("keydown", (e) => {
  if (e.key === "1") mode = 1
  if (e.key === "2") mode = 2
  if (e.key === "3") mode = 3
})

function animate() {
  time += 0.02

  ctx.fillStyle = "#000000"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  const minDim = Math.min(canvas.width, canvas.height)
  const baseScale = minDim * 0.04

  const pulse = 1 + Math.sin(time * 2) * 0.05
  const rotation = time * 0.5

  const fontSize = Math.max(10, minDim * 0.022)

  for (let obj of objects) {
    obj.t += 0.003
    let { x, y } = heart(obj.t)

    let rotatedX = x * Math.cos(rotation)
    let z = x * Math.sin(rotation)

    const perspective = 1 / (1 + z * 0.03)

    const finalX = canvas.width / 2 + rotatedX * baseScale * perspective * pulse
    const finalY = canvas.height / 2 - y * baseScale * perspective * pulse

    // СТИЛИ
    if (mode === 1) {
      ctx.fillStyle = "#3b0012"
      ctx.shadowBlur = 0
    }

    if (mode === 2) {
      ctx.fillStyle = "#2a000d"
      ctx.shadowBlur = 0
    }

    if (mode === 3) {
      ctx.fillStyle = "#5a0a1d"
      ctx.shadowColor = "#8a1a2f"
      ctx.shadowBlur = 12
    }

    ctx.font = `bold ${fontSize * perspective}px Georgia`
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    ctx.fillText(text, finalX, finalY)
  }

  requestAnimationFrame(animate)
}

window.addEventListener("resize", resize)

animate()
</script>
</body>
</html>
